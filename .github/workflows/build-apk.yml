name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notes to include on the GitHub Release (tag builds only)'
        required: false
        default: ''

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.9'
  FLUTTER_CHANNEL: 'stable'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Verify Flutter install
        run: flutter --version

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set. Add the base64-encoded contents of android/app/google-services.json to repository secrets."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
          if ! python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" 2>/dev/null; then
            echo "::error::Decoded google-services.json is not valid JSON. Re-encode with: base64 -w0 android/app/google-services.json"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Collect APKs
        id: collect
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/MyPanic-universal-release.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/MyPanic-armeabi-v7a-release.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk artifacts/MyPanic-arm64-v8a-release.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk artifacts/MyPanic-x86_64-release.apk
          ls -lh artifacts/
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyPanic-APK-${{ steps.collect.outputs.short_sha }}
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          body: |
            MyPanic Android release build.

            **Downloads:**
            - `MyPanic-arm64-v8a-release.apk` — modern 64-bit phones (recommended for most users)
            - `MyPanic-armeabi-v7a-release.apk` — older 32-bit phones
            - `MyPanic-x86_64-release.apk` — Android emulators / x86 devices
            - `MyPanic-universal-release.apk` — works everywhere, larger file

            ${{ github.event.inputs.release_notes }}

            Install: enable "Install unknown apps" for your browser/file manager, then open the downloaded APK.
